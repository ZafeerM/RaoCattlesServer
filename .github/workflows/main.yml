name: Build and Deploy to MonsterASP.NET

on:
  push:

jobs:
  build_and_deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RaoCattles.Api/RaoCattles.Api.csproj

      - name: Build
        run: dotnet build RaoCattles.Api/RaoCattles.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish RaoCattles.Api/RaoCattles.Api.csproj --configuration Release --output ./publish --no-restore

      - name: Deploy via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
